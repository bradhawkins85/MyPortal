upstream myportal_app {
  server 127.0.0.1:8000 max_fails=3 fail_timeout=10s;
  keepalive 32;
}

server {
  listen 80;
  listen [::]:80;
  server_name _;

  client_max_body_size 15m;

  # Cheap liveness probe handed to nginx/k8s health checks.  This must
  # never be retried because if it ever returns non-200 we genuinely
  # want to know.
  location = /healthz {
    proxy_pass http://myportal_app;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Connection "";
    access_log off;
  }

  # Readiness probe used by rolling-deploy tooling.  503s here are
  # informational, not failures, so we do not retry them either.
  location = /readyz {
    proxy_pass http://myportal_app;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Connection "";
    access_log off;
  }

  location / {
    proxy_pass http://myportal_app;
    proxy_http_version 1.1;
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # For external TLS termination, set this to the incoming forwarded protocol.
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    # Ride over short upstream blips (graceful systemd reload, worker
    # cycling, blue/green flips).  Idempotent verbs only — POST/PUT are
    # not retried because the upstream may have already processed them.
    proxy_next_upstream error timeout http_502 http_503 http_504;
    proxy_next_upstream_tries 2;
    proxy_next_upstream_timeout 5s;
  }
}
