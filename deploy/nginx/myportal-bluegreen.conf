# Blue/green nginx config for two-instance MyPortal rolling deploys
# (Track B2 of docs/zero_downtime_upgrades.md).
#
# Both instances point at the same MySQL database.  scripts/upgrade.sh
# --rolling drains one side, upgrades it, waits for /readyz, then does
# the other side so user requests are continuously served by at least
# one instance.
#
# The state file ``/etc/nginx/myportal-bluegreen.state`` lets the
# upgrade script flip a single instance to ``down`` without editing
# this file by hand:
#
#   echo "blue down"  | sudo tee /etc/nginx/myportal-bluegreen.state
#   sudo nginx -s reload
#
# Drop in ``include /etc/nginx/myportal-bluegreen.state;`` inside the
# ``upstream`` block (commented out by default below) and add lines
# like ``server 127.0.0.1:8001 down;`` to drain that instance.

upstream myportal_app {
  # Run two MyPortal systemd instances:
  #   systemctl enable --now myportal@blue.service   # listens on 8001
  #   systemctl enable --now myportal@green.service  # listens on 8002
  server 127.0.0.1:8001 max_fails=3 fail_timeout=10s;
  server 127.0.0.1:8002 max_fails=3 fail_timeout=10s;
  keepalive 32;

  # Optional drain marker file written by scripts/upgrade.sh --rolling.
  # Uncomment after creating /etc/nginx/myportal-bluegreen.state.
  # include /etc/nginx/myportal-bluegreen.state;
}

server {
  listen 80;
  listen [::]:80;
  server_name _;

  client_max_body_size 15m;

  location = /healthz {
    proxy_pass http://myportal_app;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Connection "";
    access_log off;
  }

  location = /readyz {
    proxy_pass http://myportal_app;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Connection "";
    access_log off;
  }

  location / {
    proxy_pass http://myportal_app;
    proxy_http_version 1.1;
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    # Failover to the other backend if the active one is being
    # restarted or has been marked ``down``.
    proxy_next_upstream error timeout http_502 http_503 http_504;
    proxy_next_upstream_tries 2;
    proxy_next_upstream_timeout 5s;
  }
}
