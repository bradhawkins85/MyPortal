{# Quick actions card #}
{% set p = payload or {} %}
{% set items = p.get('items') or [] %}
<div class="dashboard-card__quick-actions">
  {% if items %}
    <ul class="quick-actions" role="list">
      {% for item in items %}
        <li class="quick-actions__item" role="listitem">
          <a class="button button--ghost" href="{{ item.href }}">{{ item.label }}</a>
        </li>
      {% endfor %}
    </ul>
  {% else %}
    <p class="dashboard-card__empty">No quick actions available.</p>
  {% endif %}
</div>
