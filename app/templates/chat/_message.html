<div class="chat-message{% if msg.sender_user_id == current_user_id %} chat-message--self{% endif %}" data-event-id="{{ msg.matrix_event_id | default('') }}">
  <div class="chat-message__meta">
    {{ msg.sender_display_name | default(msg.sender_matrix_id) | e }}
    &bull;
    {{ msg.sent_at | default('') }}
  </div>
  <div class="chat-message__body">{{ msg.body | default('') | e }}</div>
</div>
