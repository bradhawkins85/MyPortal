name: Tray App Build & Release

on:
  push:
    tags:
      - 'tray/v*'
  pull_request:
    paths:
      - 'tray/**'

permissions:
  contents: write

jobs:
  test:
    name: Go tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tray
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: tray/go.sum
      - name: Download modules
        run: go mod download
      - name: Test
        run: go test -count=1 -v ./...

  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            ext: .exe
          - goos: darwin
            goarch: amd64
            ext: ''
          - goos: darwin
            goarch: arm64
            ext: ''
    defaults:
      run:
        working-directory: tray
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: tray/go.sum
      - name: Download modules
        run: go mod download
      - name: Build service
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "0.0.0-dev")
          LDFLAGS="-X 'github.com/bradhawkins85/myportal-tray/internal/updater.AgentVersion=${VERSION}'"
          go build -ldflags "${LDFLAGS}" -o dist/${{ matrix.goos }}-${{ matrix.goarch }}/myportal-tray-service${{ matrix.ext }} ./service
      - name: Build UI
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
          GOFLAGS: '-tags nowebview'
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "0.0.0-dev")
          LDFLAGS="-X 'github.com/bradhawkins85/myportal-tray/internal/updater.AgentVersion=${VERSION}'"
          go build -ldflags "${LDFLAGS}" -o dist/${{ matrix.goos }}-${{ matrix.goarch }}/myportal-tray-ui${{ matrix.ext }} ./ui
      - uses: actions/upload-artifact@v4
        with:
          name: tray-${{ matrix.goos }}-${{ matrix.goarch }}
          path: tray/dist/${{ matrix.goos }}-${{ matrix.goarch }}/

  release:
    name: Create release
    if: startsWith(github.ref, 'refs/tags/tray/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Package archives
        run: |
          for dir in artifacts/tray-*/; do
            name=$(basename "$dir")
            zip -r "${name}.zip" "$dir"
          done
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.zip'
          generate_release_notes: true
