name: Tray App Build & Release

on:
  push:
    tags:
      - 'tray/v*'
  pull_request:
    paths:
      - 'tray/**'

permissions:
  contents: write

jobs:
  test:
    name: Go tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tray
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: tray/go.sum
      - name: Download modules
        run: go mod download
      - name: Test
        run: go test -count=1 -v ./...

  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            ext: .exe
          - goos: darwin
            goarch: amd64
            ext: ''
          - goos: darwin
            goarch: arm64
            ext: ''
    defaults:
      run:
        working-directory: tray
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: tray/go.sum
      - name: Download modules
        run: go mod download
      - name: Build service
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "0.0.0-dev")
          LDFLAGS="-X 'github.com/bradhawkins85/myportal-tray/internal/updater.AgentVersion=${VERSION}'"
          go build -ldflags "${LDFLAGS}" -o dist/${{ matrix.goos }}-${{ matrix.goarch }}/myportal-tray-service${{ matrix.ext }} ./service
      - name: Build UI
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
          GOFLAGS: '-tags nowebview'
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "0.0.0-dev")
          LDFLAGS="-X 'github.com/bradhawkins85/myportal-tray/internal/updater.AgentVersion=${VERSION}'"
          go build -ldflags "${LDFLAGS}" -o dist/${{ matrix.goos }}-${{ matrix.goarch }}/myportal-tray-ui${{ matrix.ext }} ./ui
      - uses: actions/upload-artifact@v4
        with:
          name: tray-${{ matrix.goos }}-${{ matrix.goarch }}
          path: tray/dist/${{ matrix.goos }}-${{ matrix.goarch }}/

  build-msi:
    name: Build Windows MSI installer
    needs: build
    # WiX is Windows-only (see wixtoolset/issues#7154); the Directory/@Name
    # validator always fails on Linux/macOS. Use a Windows runner so the MSI
    # actually builds.
    runs-on: windows-latest
    defaults:
      run:
        working-directory: tray
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'
      - name: Install WiX v7
        run: dotnet tool install --global wix --version "7.*"
      - uses: actions/download-artifact@v4
        with:
          name: tray-windows-amd64
          path: tray/dist/windows
      - name: Build MSI
        # `-acceptEula wix7` accepts the FireGiant OSMF EULA non-interactively
        # so the build does not fail with WIX7015. See
        # https://docs.firegiant.com/wix/osmf/
        shell: pwsh
        run: |
          wix build -acceptEula wix7 installer/windows/myportal-tray.wxs `
            -d BinDir="$(Resolve-Path dist/windows)" `
            -o dist/windows/myportal-tray.msi
      - uses: actions/upload-artifact@v4
        with:
          name: tray-windows-msi
          path: tray/dist/windows/myportal-tray.msi

  build-pkg:
    name: Build macOS .pkg installer
    needs: build
    runs-on: macos-latest
    defaults:
      run:
        working-directory: tray
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: tray-darwin-amd64
          path: tray/dist/darwin-amd64
      - uses: actions/download-artifact@v4
        with:
          name: tray-darwin-arm64
          path: tray/dist/darwin-arm64
      - name: Make binaries executable
        run: |
          chmod +x dist/darwin-amd64/myportal-tray-service dist/darwin-amd64/myportal-tray-ui
          chmod +x dist/darwin-arm64/myportal-tray-service dist/darwin-arm64/myportal-tray-ui
      - name: Create universal binaries
        run: |
          mkdir -p dist/darwin
          lipo -create -output dist/darwin/myportal-tray-service \
              dist/darwin-amd64/myportal-tray-service \
              dist/darwin-arm64/myportal-tray-service
          lipo -create -output dist/darwin/myportal-tray-ui \
              dist/darwin-amd64/myportal-tray-ui \
              dist/darwin-arm64/myportal-tray-ui
      - name: Build macOS .pkg
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "0.0.0-dev")
          (cd installer/macos && bash build-pkg.sh "${VERSION}")
          mkdir -p dist/darwin
          mv installer/macos/myportal-tray-${VERSION}.pkg dist/darwin/myportal-tray.pkg
          rm -f installer/macos/myportal-tray-${VERSION}-unsigned.pkg
      - uses: actions/upload-artifact@v4
        with:
          name: tray-darwin-pkg
          path: tray/dist/darwin/myportal-tray.pkg

  release:
    name: Create release
    if: startsWith(github.ref, 'refs/tags/tray/')
    needs: [build, build-msi, build-pkg]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Package binary archives
        run: |
          for dir in artifacts/tray-*/; do
            [ -d "$dir" ] || continue
            # Skip installer artifact directories (msi / pkg) — only zip raw binaries.
            case "$(basename "$dir")" in
              tray-windows-msi|tray-darwin-pkg) continue ;;
            esac
            name=$(basename "$dir")
            zip -r "${name}.zip" "$dir"
          done
      - name: Stage installers
        run: |
          if [ -f artifacts/tray-windows-msi/myportal-tray.msi ]; then
            cp artifacts/tray-windows-msi/myportal-tray.msi .
          else
            echo "Warning: myportal-tray.msi artifact not found; MSI will be omitted from release." >&2
          fi
          if [ -f artifacts/tray-darwin-pkg/myportal-tray.pkg ]; then
            cp artifacts/tray-darwin-pkg/myportal-tray.pkg .
          else
            echo "Warning: myportal-tray.pkg artifact not found; .pkg will be omitted from release." >&2
          fi
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.zip
            myportal-tray.msi
            myportal-tray.pkg
          generate_release_notes: true

